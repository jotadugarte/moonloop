# fly.toml app configuration file generated for moonloop on 2026-04-22T22:25:37-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moonloop'
primary_region = 'iad'
console_command = '/rails/bin/rails console'

[build]

[env]
  # Must match http_service.internal_port. Puma reads PORT (config/puma.rb).
  # Use 8080 so the non-root container user can bind (port 80 usually needs root/CAP_NET_BIND_SERVICE).
  PORT = '8080'

[processes]
  app = './bin/rails server'
  solidq = 'bundle exec rake solid_queue:start'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '60s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
