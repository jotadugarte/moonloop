<%
  # Fly/Rails multidb URLs must keep an absolute path. DATABASE_URL often has no
  # /dbname (e.g. ...flycast:5432), so appending "_cache" to path breaks URI parsing.
  def moonloop_db_url_with_suffix(database_url, suffix)
    return nil if database_url.nil? || database_url.empty?
    uri = URI.parse(database_url)
    base = uri.path.to_s.delete_prefix("/")
    base = "moonloop_production" if base.empty?
    uri.path = "/#{base}#{suffix}"
    uri.to_s
  end
%>
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { "5433" } %>
  username: <%= ENV.fetch("DB_USER") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "password" } %>

development:
  <<: *default
  database: moonloop_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: moonloop_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
    url: <%= moonloop_db_url_with_suffix(ENV["DATABASE_URL"], "_cache") %>
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
    url: <%= moonloop_db_url_with_suffix(ENV["DATABASE_URL"], "_queue") %>
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate
    url: <%= moonloop_db_url_with_suffix(ENV["DATABASE_URL"], "_cable") %>
